    { titulo: "Complicações em harmonização facial (e como evitar)", gancho: "Ninguém fala sobre complicações, mas elas existem.", desenvolvimento: "Complicações possíveis: hematoma (roxo) — normal, passa em 1 semana; edema (inchaço) — normal, passa em 3 dias; assimetria — evitar com análise correta; granulomas — reação ao preenchimento, raro; necrose — injetar em artéria, muito raro. Como evitar: conhecer a anatomia vascular, usar agulha ou cânula corretamente, não injetar demais, seguir protocolo.", cta: "Qual é a sua maior preocupação com complicações? Comente." },
    { titulo: "Resultado natural é 10x melhor que resultado 'operado'", gancho: "Você quer parecer operado ou quer parecer bem?", desenvolvimento: "Resultado natural: pessoas não sabem que você fez procedimento, você fica bonito naturalmente, movimento facial normal, proporções equilibradas. Resultado 'operado': todos sabem que você fez, rosto exagerado, movimento facial limitado, proporções desproporcionais. A diferença está na quantidade de produto, técnica e análise. Profissional bom faz natural. Profissional ruim faz exagerado.", cta: "Você prefere natural ou exagerado? Comente aqui." },
    { titulo: "Manutenção em harmonização facial é estratégia, não rotina", gancho: "Você está fazendo manutenção errada.", desenvolvimento: "Manutenção errada: repetir o mesmo procedimento a cada 3 meses — resultado fica igual. Manutenção estratégica: meses 1 a 3, botox mais preenchimento; meses 4 a 6, apenas botox (economia); meses 7 a 9, botox mais peeling (renovação); meses 10 a 12, fios (lifting). Estratégia: variar procedimentos, economizar, melhorar resultado.", cta: "Qual é a sua estratégia de manutenção? Deixe nos comentários." },
    { titulo: "Combinar procedimentos = resultado exponencial", gancho: "Um procedimento é bom, mas dois juntos é 10x melhor.", desenvolvimento: "Combinações que funcionam: Botox mais preenchimento resulta em rosto jovem e volumoso; peeling mais microagulhamento resulta em pele renovada com colágeno; fios mais preenchimento resulta em lifting com volume; Botox mais fios resulta em reduz rugas com sustentação. Sinergia: cada procedimento potencializa o outro. Resultado: melhor que cada um sozinho.", cta: "Qual combinação você gostaria de fazer? Comente." },
    { titulo: "Como evitar paciente insatisfeito", gancho: "Você está perdendo pacientes por falta de comunicação.", desenvolvimento: "Causas de insatisfação: expectativa errada (paciente esperava mais), resultado diferente do esperado, comunicação ruim, falta de acompanhamento. Como evitar: conversa clara sobre expectativas, mostrar fotos de resultados similares, explicar limitações, acompanhamento pós-procedimento, oferecer ajuste se necessário. Comunicação é 50% do resultado.", cta: "Qual é o seu maior desafio com paciente? Comente aqui." },
    { titulo: "Tendências em harmonização facial 2025", gancho: "Harmonização facial está mudando. Aqui estão as tendências.", desenvolvimento: "Tendências: resultado natural (menos é mais), prevenção precoce (botox aos 20 a 25 anos), combinação de procedimentos, tecnologia (laser, radiofrequência, ultrassom), foco em bem-estar (não apenas beleza), harmonização corporal (não só rosto). O que NÃO é tendência: rosto exagerado, lábios gigantes, maçãs enormes. Profissional que acompanha tendências permanece sempre relevante.", cta: "Qual tendência você quer seguir? Deixe nos comentários." },
    { titulo: "Por que o preço varia tanto em harmonização facial?", gancho: "Você achou barato? Cuidado.", desenvolvimento: "Diferenças: profissional iniciante (R$ 200 a 500) versus experiente (R$ 1.000 a 3.000); formação em curso online versus residência médica; experiência de 6 meses versus 10 anos; consultório simples versus premium; resultado ruim versus resultado ótimo. Barato geralmente resulta em resultado ruim. Caro geralmente resulta em resultado bom. Investir em profissional bom resulta em resultado melhor e duradouro.", cta: "Qual é o seu orçamento? Comente aqui." },
    { titulo: "Essas pessoas NÃO devem fazer harmonização facial", gancho: "Você tem alguma dessas condições? Não faça.", desenvolvimento: "Contraindicações reais: gravidez e amamentação (risco para o bebê), alergia comprovada aos componentes, inflamação ativa (acne, herpes), anticoagulantes (risco de sangramento excessivo), doenças autoimunes descontroladas, cicatrização anormal, expectativa irreal. Profissional qualificado avalia contraindicações. Não faça procedimento sem avaliação. Responsabilidade do profissional é dizer 'não' quando necessário.", cta: "Você tem alguma contraindicação? Procure profissional." },
    { titulo: "Protocolo de recuperação que funciona", gancho: "Você está fazendo errado a recuperação.", desenvolvimento: "Protocolo correto: primeiras 24h — não tocar, não deitar, não fazer exercício; primeiras 48h — protetor solar SPF 50+, hidratação; primeiros 7 dias — evitar calor, álcool, sauna; primeiros 14 dias — maquiagem leve. Sinais normais: roxo e inchaço (passam em 3 a 7 dias). Sinais de alerta: dor excessiva, inflamação, infecção — procure profissional. Protocolo correto resulta em recuperação rápida e resultado melhor.", cta: "Qual é o seu maior desafio na recuperação? Comente." },
    { titulo: "Como analisar foto para diagnóstico correto", gancho: "Você está analisando foto errado.", desenvolvimento: "Análise correta: foto frontal sem filtro e com luz natural, foto de perfil sem filtro e com luz natural, foto em 3/4 sem filtro e com luz natural, expressão neutra (sem sorrir), expressão dinâmica (sorrindo, franzindo). Sem essas fotos, o diagnóstico é incompleto. Filtro esconde problemas reais. Luz artificial muda proporções. Profissional que analisa foto corretamente faz diagnóstico correto.", cta: "Você tem fotos para análise? Deixe nos comentários." },
    { titulo: "Resultado em harmonização facial é progressivo, não imediato", gancho: "Você esperava resultado imediato? Aqui está a timeline real.", desenvolvimento: "Timeline: Botox leva 3 a 7 dias para começar, 14 dias para resultado máximo; preenchimento tem resultado imediato, mas melhora em 2 semanas (inchaço diminui); fios têm resultado imediato, melhora em 1 mês (colágeno se forma); peeling tem resultado em 1 semana (descamação); microagulhamento tem resultado em 4 semanas (colágeno novo). Resultado melhora com o tempo. Não julgue resultado nos primeiros dias.", cta: "Qual é a sua expectativa de timeline? Comente aqui." },
    { titulo: "Saber quando parar é tão importante quanto saber quando começar", gancho: "Você sabe quando parar?", desenvolvimento: "Sinais de parar: rosto começa a parecer 'operado', movimento facial limitado, proporções desproporcionais, paciente insatisfeito mesmo com mais procedimentos, resultado não melhora mais. Importante: harmonização é sobre equilíbrio, não sobre quantidade. Profissional responsável diz 'não' quando necessário. Melhor profissional é aquele que sabe quando parar. Paciente que confia em profissional que sabe parar é paciente fiel.", cta: "Você sabe quando parar? Deixe nos comentários." },
  ],

  socialmedia: [
    { titulo: "O algoritmo do Instagram não é tão complicado quanto você pensa", gancho: "Você acha que o algoritmo é aleatório? Ele segue 3 regras simples.", desenvolvimento: "O algoritmo do Instagram prioriza: 1) Tempo em que você passa vendo o post (se você fica 5 segundos, é bom), 2) Interações (comentários, compartilhamentos, salvos), 3) Relevância (se você segue pessoas similares). Não é sobre quantos seguidores você tem. É sobre engajamento. Um post com 100 seguidores mas 50 comentários vai chegar em mais gente do que um post com 10.000 seguidores e 2 comentários.", cta: "Qual é o seu maior desafio com o algoritmo? Comente aqui." },
    { titulo: "Qual é a melhor hora para postar no Instagram?", gancho: "Você está postando na hora errada. Veja quando o seu público está online.", desenvolvimento: "Não existe 'melhor hora universal'. Depende do seu público. Se você segue profissionais de saúde, eles estão online entre 12h e 14h (pausa do almoço) e 19h e 21h (depois do trabalho). Se você segue estudantes, eles estão online à noite (21h às 23h). Você precisa testar. Poste em diferentes horários e veja qual gera mais engajamento. Use as estatísticas do Instagram (Insights) para ver quando seu público está mais ativo.", cta: "Qual é o melhor horário para o seu público? Deixe nos comentários." },
    { titulo: "Esses 5 tipos de conteúdo viralizam sempre", gancho: "Se você quer viralizar, crie UM desses 5 tipos.", desenvolvimento: "1) Conteúdo educativo (dicas, tutoriais), 2) Conteúdo emocional (histórias, inspiração), 3) Conteúdo engraçado (humor, sátira), 4) Conteúdo controverso (opinião forte, debate), 5) Conteúdo de tendência (usando trending topics). Esses 5 tipos geram engajamento consistente. Escolha UM que você domina e crie conteúdo baseado nele. Não tente fazer todos ao mesmo tempo.", cta: "Qual desses 5 tipos você mais cria? Comente." },
    { titulo: "Qual é o tamanho ideal de vídeo para cada plataforma?", gancho: "Você está fazendo vídeos muito longos. Veja o tamanho ideal.", desenvolvimento: "Instagram Reels: 15 a 30 segundos (máximo 90s). TikTok: 15 a 60 segundos. YouTube Shorts: 15 a 60 segundos. Facebook: 1 a 3 minutos. LinkedIn: 30 segundos a 1 minuto. Vídeos curtos geram mais engajamento porque as pessoas têm pouca atenção. Se você faz vídeo de 5 minutos no Reels, 90% vai pular. Mantenha curto, direto e interessante.", cta: "Qual é o seu tamanho de vídeo ideal? Deixe nos comentários." },
    { titulo: "Os primeiros 3 segundos definem se as pessoas vão ver seu vídeo", gancho: "80% das pessoas pulam vídeos nos primeiros 3 segundos. Aqui está como não deixar pular.", desenvolvimento: "Seu gancho precisa responder: 'Por que devo ver esse vídeo?' Use: 1) Pergunta (faz a pessoa pensar), 2) Curiosidade (deixa em suspense), 3) Benefício (promete algo), 4) Emoção (surpresa, riso, raiva). Exemplo de gancho ruim: 'Olá, hoje vou falar sobre marketing'. Exemplo de gancho bom: 'Você está fazendo marketing errado. Aqui está como consertar'. O segundo cria urgência.", cta: "Qual é o seu melhor gancho? Compartilhe um exemplo." },
    { titulo: "Como escrever uma caption que gera comentários", gancho: "Sua caption é chata. Aqui está como fazer as pessoas comentarem.", desenvolvimento: "Caption perfeita tem: 1) Primeira linha impactante (resumo), 2) Desenvolvimento (contexto), 3) Pergunta no final (para gerar comentários). Exemplo: 'Você está fazendo marketing errado. [Explicação]. Qual é o seu maior desafio? Comente.' Muita gente não coloca pergunta e depois reclama que não tem comentários. Perguntas geram comentários. Sempre termine com uma pergunta.", cta: "Qual é a sua dúvida sobre captions? Deixe nos comentários." },
    { titulo: "Você está usando hashtags errado", gancho: "Colocar 30 hashtags aleatórias não funciona. Aqui está o jeito certo.", desenvolvimento: "Hashtags funcionam assim: 1) Use 10 a 15 hashtags relevantes (não 30), 2) Misture hashtags grandes (1M+ posts) com pequenas (10k a 100k posts), 3) Crie uma hashtag própria para sua marca, 4) Pesquise hashtags que seu público usa. Hashtags específicas têm menos concorrência e mais conversão.", cta: "Qual é a sua hashtag principal? Deixe nos comentários." },
    { titulo: "Carrossel, Reels ou Stories? Qual você deve usar?", gancho: "Cada formato tem um objetivo. Escolha o certo.", desenvolvimento: "Carrossel (múltiplas imagens): para conteúdo educativo, passo a passo, antes e depois. Reels (vídeo curto): para conteúdo viral, tendências, humor. Stories (desaparece em 24h): para conteúdo casual, bastidores, urgência. Use carrossel para educar, Reels para viralizar, Stories para engajar. Não misture: não faça Reels educativo longo (use carrossel).", cta: "Qual formato você mais usa? Comente aqui." },
    { titulo: "Comentários positivos vendem mais que sua propaganda", gancho: "92% das pessoas acreditam mais em recomendações de outras pessoas do que em publicidade.", desenvolvimento: "Prova social é quando outras pessoas recomendam você. Funciona assim: 1) Peça para clientes comentarem, 2) Responda comentários positivos com emoji ou coração, 3) Compartilhe depoimentos nos Stories, 4) Crie vídeo com depoimentos. Comentários positivos são mais poderosos que qualquer anúncio que você pague. Por quê? Porque é de verdade. Pessoas confiam em pessoas, não em marcas.", cta: "Você tem depoimentos de clientes? Compartilhe um aqui." },

                        {[
                          { label: "🎯 GANCHO (0-3s)", texto: r.gancho, cor: "#f472b6" },
                          { label: "📖 DESENVOLVIMENTO (15-30s)", texto: r.desenvolvimento, cor: "#a78bfa" },
                          { label: "✅ CTA (3-5s)", texto: r.cta, cor: "#34d399" },
                        ].map((sec, j) => (
                          <div key={j} style={{ background: "rgba(255,255,255,0.04)", borderRadius: "10px", padding: "12px" }}>
                            <div style={{ fontSize: "10px", fontWeight: "700", color: sec.cor, marginBottom: "6px", letterSpacing: "0.5px" }}>{sec.label}</div>
                            <p style={{ margin: 0, fontSize: "13px", lineHeight: "1.6", color: "rgba(255,255,255,0.85)" }}>{sec.texto}</p>
                          </div>
                        ))}
                        <button onClick={() => copiarTexto(formatarRoteiroTexto(r), i)} style={{ padding: "12px", background: roteiroCopied === i ? "rgba(52,211,153,0.2)" : "linear-gradient(135deg, #7c3aed, #db2777)", border: roteiroCopied === i ? "1px solid #34d399" : "none", borderRadius: "10px", color: roteiroCopied === i ? "#34d399" : "#fff", cursor: "pointer", fontSize: "13px", fontWeight: "600", transition: "all 0.3s" }}>
                          {roteiroCopied === i ? "✅ Copiado!" : "📋 Copiar roteiro completo"}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ABA: ROTEIRO INFINITO */}
        {tab === "infinito" && (
          <div>
            <p style={{ color: "rgba(255,255,255,0.5)", fontSize: "13px", marginBottom: "20px" }}>Digite qualquer assunto e o app gera um roteiro completo na hora.</p>
            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "16px", padding: "20px", marginBottom: "20px" }}>
              <label style={{ display: "block", fontSize: "12px", color: "rgba(255,255,255,0.6)", marginBottom: "8px", fontWeight: "600" }}>ASSUNTO DO ROTEIRO</label>
              <textarea value={roteiroInfinito.assunto} onChange={e => setRoteiroInfinito(prev => ({ ...prev, assunto: e.target.value }))} placeholder={`Ex: ansiedade em ${especialidadeAtiva.label.toLowerCase()}, prevenção de doenças, dicas práticas...`} style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "10px", padding: "12px", color: "#fff", fontSize: "14px", minHeight: "80px", resize: "vertical", boxSizing: "border-box", outline: "none", fontFamily: "inherit" }} />
              <button onClick={gerarRoteiroInfinito} disabled={roteiroInfinito.loading || !roteiroInfinito.assunto.trim()} style={{ marginTop: "12px", width: "100%", padding: "14px", background: roteiroInfinito.loading ? "rgba(255,255,255,0.1)" : "linear-gradient(135deg, #7c3aed, #db2777)", border: "none", borderRadius: "10px", color: "#fff", fontSize: "14px", fontWeight: "700", cursor: roteiroInfinito.loading ? "not-allowed" : "pointer" }}>
                {roteiroInfinito.loading ? "⏳ Gerando roteiro..." : "✨ Gerar Roteiro Agora"}
              </button>
            </div>
            {roteiroInfinito.resultado && (
              <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: "16px", padding: "20px" }}>
                <h3 style={{ margin: "0 0 16px", fontSize: "15px", fontWeight: "700", color: "#a78bfa" }}>📌 {roteiroInfinito.resultado.titulo}</h3>
                {[
                  { label: "🎯 GANCHO (0-3s)", texto: roteiroInfinito.resultado.gancho, cor: "#f472b6" },
                  { label: "📖 DESENVOLVIMENTO (15-30s)", texto: roteiroInfinito.resultado.desenvolvimento, cor: "#a78bfa" },
                  { label: "✅ CTA (3-5s)", texto: roteiroInfinito.resultado.cta, cor: "#34d399" },
                ].map((sec, j) => (
                  <div key={j} style={{ background: "rgba(255,255,255,0.04)", borderRadius: "10px", padding: "12px", marginBottom: "10px" }}>
                    <div style={{ fontSize: "10px", fontWeight: "700", color: sec.cor, marginBottom: "6px" }}>{sec.label}</div>
                    <p style={{ margin: 0, fontSize: "13px", lineHeight: "1.6", color: "rgba(255,255,255,0.85)" }}>{sec.texto}</p>
                  </div>
                ))}
                <button onClick={() => copiarTexto(formatarRoteiroTexto(roteiroInfinito.resultado), "inf")} style={{ width: "100%", padding: "12px", background: roteiroCopied === "inf" ? "rgba(52,211,153,0.2)" : "linear-gradient(135deg, #7c3aed, #db2777)", border: roteiroCopied === "inf" ? "1px solid #34d399" : "none", borderRadius: "10px", color: roteiroCopied === "inf" ? "#34d399" : "#fff", cursor: "pointer", fontSize: "13px", fontWeight: "600" }}>
                  {roteiroCopied === "inf" ? "✅ Copiado!" : "📋 Copiar roteiro completo"}
                </button>
              </div>
            )}
          </div>
        )}

        {/* ABA: GPS DOS STORIES */}
        {tab === "gps" && (
          <div>
            <p style={{ color: "rgba(255,255,255,0.5)", fontSize: "13px", marginBottom: "20px" }}>Sequências de Stories com fio condutor — cada story puxa para o próximo.</p>
            <div style={{ display: "flex", gap: "8px", marginBottom: "20px" }}>
              <button onClick={() => setGpsConfig(prev => ({ ...prev, tipo: "3" }))} style={{ flex: 1, padding: "10px", border: "none", borderRadius: "10px", cursor: "pointer", fontWeight: "700", fontSize: "13px", background: gpsConfig.tipo === "3" ? "linear-gradient(135deg, #7c3aed, #db2777)" : "rgba(255,255,255,0.08)", color: "#fff" }}>3 Stories</button>
              <button onClick={() => setGpsConfig(prev => ({ ...prev, tipo: "5" }))} style={{ flex: 1, padding: "10px", border: "none", borderRadius: "10px", cursor: "pointer", fontWeight: "700", fontSize: "13px", background: gpsConfig.tipo === "5" ? "linear-gradient(135deg, #7c3aed, #db2777)" : "rgba(255,255,255,0.08)", color: "#fff" }}>5 Stories</button>
            </div>
            {(gpsConfig.tipo === "3" ? GPS_STORIES.sequencias3 : GPS_STORIES.sequencias5).map((seq, si) => (
              <div key={si} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "16px", padding: "20px", marginBottom: "16px" }}>
                <h3 style={{ margin: "0 0 16px", fontSize: "14px", fontWeight: "700", color: "#a78bfa" }}>🗺️ {seq.tema}</h3>
                {seq.stories.map((s, j) => (
                  <div key={j} style={{ display: "flex", gap: "12px", marginBottom: "12px" }}>
                    <div style={{ background: "linear-gradient(135deg, #7c3aed, #db2777)", borderRadius: "50%", width: "28px", height: "28px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: "700", flexShrink: 0 }}>{s.numero}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "10px", color: "#f472b6", fontWeight: "700", marginBottom: "4px" }}>{s.tipo}</div>
                      <p style={{ margin: 0, fontSize: "13px", lineHeight: "1.6", color: "rgba(255,255,255,0.85)", background: "rgba(255,255,255,0.04)", borderRadius: "10px", padding: "10px" }}>{s.texto}</p>
                    </div>
                  </div>
                ))}
                <button onClick={() => copiarTexto(seq.stories.map(s => `Story ${s.numero} — ${s.tipo}:\n${s.texto}`).join("\n\n"), `gps-${si}`)} style={{ width: "100%", padding: "11px", background: roteiroCopied === `gps-${si}` ? "rgba(52,211,153,0.2)" : "rgba(167,139,250,0.15)", border: `1px solid ${roteiroCopied === `gps-${si}` ? "#34d399" : "rgba(167,139,250,0.4)"}`, borderRadius: "10px", color: roteiroCopied === `gps-${si}` ? "#34d399" : "#a78bfa", cursor: "pointer", fontSize: "13px", fontWeight: "600" }}>
                  {roteiroCopied === `gps-${si}` ? "✅ Copiado!" : "📋 Copiar sequência"}
                </button>
              </div>
            ))}
          </div>
        )}

        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.2)", fontSize: "11px", marginTop: "32px" }}>© Aline Paula | @alinesapaula</p>
      </div>
    </div>
  );
}

const { useState } = React;
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
